<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjectives Formed with Suffixes and Prefixes — English NMT Prep</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FDF8F3;
            --text: #2D2A26;
            --text-light: #6B6560;
            --accent: #E07A5F;
            --card: #FFFFFF;
            --shadow: rgba(45,42,38,0.06);
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: rgba(253,248,243,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(45,42,38,0.06);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        .logo span { color: var(--accent); }
        .back-btn {
            padding: 8px 20px; background: var(--card);
            border: 1.5px solid rgba(45,42,38,0.1);
            border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 600;
            text-decoration: none; color: var(--text); transition: all 0.3s ease;
        }
        .back-btn:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(45,42,38,0.08); }
        .main { padding-top: 100px; max-width: 800px; margin: 0 auto; padding-bottom: 80px; padding-left: 24px; padding-right: 24px; }
        h1 { font-size: 34px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .breadcrumb { font-size: 14px; color: var(--text-light); margin-bottom: 40px; }
        .placeholder {
            background: var(--card); border-radius: 16px; padding: 60px 40px;
            box-shadow: 0 4px 24px var(--shadow);
            text-align: center; color: var(--text-light);
        }
        .placeholder h2 { color: var(--text); margin-bottom: 12px; font-size: 22px; }
        .placeholder p { font-size: 16px; max-width: 400px; margin: 0 auto; }
        @media (max-width: 640px) {
            .header { padding: 0 20px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">English<span>NMT</span></div>
        <a href="../index.html" class="back-btn">← На головну</a>

    <main class="main">
        <h1>Adjectives Formed with Suffixes and Prefixes</h1>
        <div class="breadcrumb">Граматика → ADJECTIVE → Adjectives Formed with Suffixes and Prefixes</div>

            <p>Тут скоро з'явиться теорія та вправи з теми «Adjectives Formed with Suffixes and Prefixes».</p>

    </main>
